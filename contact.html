<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact - Canone Skin</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header>

    <div class="logo">Canone Skin</div>

    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <div class="cart">
      Cart: <span id="cart-count">0</span>
    </div>

  </header>

  <!-- CONTACT SECTION -->
  <section class="contact-section">

    <h1>Contact Us</h1>

    <!-- CONTACT FORM -->
    <form>

      <input 
        type="text"
        placeholder="Your Name"
        required
      >

      <input
        type="email"
        placeholder="Your Email"
        required
      >

      <textarea
        placeholder="Your Message"
        rows="6"
      ></textarea>

      <button type="submit">
        Send Message
      </button>

    </form>

    <!-- CONTACT INFO -->
    <div class="contact-info">

      <p>Email: support@canoneskin.com</p>

      <p>Phone: +91 98765 43210</p>

      <p>Instagram: @canoneskin</p>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Canone Skin</p>
  </footer>

</body>
</html>
